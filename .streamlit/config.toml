[theme]
primaryColor = "#c084fc"
backgroundColor = "#0a0e27"
secondaryBackgroundColor = "#0f1629"
textColor = "#f0f4ff"
font = "sans serif"

[client]
showErrorDetails = false
showSidebarNavigation = true
toolbarMode = "auto"

[logger]
level = "info"

[server]
port = 8501
maxUploadSize = 50
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[runner]
magicEnabled = false
